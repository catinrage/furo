name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: sockets

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          go test -v ./tests/...

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          go build -o /tmp/furo-client ./furo-client.go
          go build -o /tmp/furo-server ./furo-server.go
